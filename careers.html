<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- CSS -->
    <link rel="stylesheet" href="./css/main.css" />
    <title>Scoot</title>
  </head>
  <body>
    <h1 class="visually-hidden">Careers-page</h1>
    <header class="header">
      <div class="container header__container">
        <button class="header__test-button">
          <img
            class="header__test-icon"
            src="./icons/open__burger.svg"
            alt="test__icon"
          />
        </button>
        <div class="header__left-box">
          <a class="header__logo-link" href="./index.html">
            <img
              class="header__logo-image"
              src="./icons/dark__logo.svg"
              alt="scoot__logo"
            />
          </a>
          <nav class="header__nav">
            <ul class="header__list">
              <li class="header__lists">
                <a class="header__links" href="./about.html">
                  <p class="header__links-texts">About</p>
                </a>
              </li>
              <li class="header__lists">
                <a class="header__links" href="./location.html">
                  <p class="header__links-texts">Location</p>
                </a>
              </li>
              <li class="header__lists">
                <a class="header__links" href="#">
                  <p class="header__links-texts">Careers</p>
                </a>
              </li>
            </ul>
          </nav>
        </div>
        <button class="header__button">Get Scootin</button>
        <button class="header__button-burger">
          <img
            class="header__open-burger-icon"
            src="./icons/open__burger.svg"
            alt="open__burger"
          />
          <img
            class="header__close-burger-icon"
            src="./icons/close__burger.svg"
            alt="close__burger"
          />
        </button>
      </div>
      <nav class="header__nav-mb">
        <ul class="header__list-mb">
          <li class="header__lists-mb">
            <a class="header__links-mb" href="./about.html">
              <p class="header__links-texts-mb">About</p>
            </a>
          </li>
          <li class="header__lists-mb">
            <a class="header__links-mb" href="./location.html">
              <p class="header__links-texts-mb">Location</p>
            </a>
          </li>
          <li class="header__lists-mb">
            <a class="header__links-mb" href="#">
              <p class="header__links-texts-mb">Careers</p>
            </a>
          </li>
        </ul>
        <button class="header__button-mb">Get Scootin</button>
      </nav>
    </header>
    <main>
      <section></section>
      <section class="sign">
        <div class="container sign__container">
          <h2 class="sign__title">Sign up and Scoot off today</h2>
          <div class="sign__box">
            <a
              class="sign__link"
              href="http://"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img
                class="sign__appstore"
                src="./icons/appstore.svg"
                alt="appstore"
              />
            </a>
            <a
              class="sign__link"
              href="http://"
              target="_blank"
              rel="noopener noreferrer"
            >
              <img
                class="sign__googleplay"
                src="./icons/googleplay.svg"
                alt="googleplay"
              />
            </a>
          </div>
        </div>
      </section>
    </main>
    <footer class="footer">
      <div class="container footer__container">
        <div class="footer__left-box">
          <a class="footer__logo-link" href="./index.html">
            <img
              class="footer__logo-image"
              src="./icons/white__logo.svg"
              alt="scoot__logo"
            />
          </a>
          <nav class="footer__nav">
            <ul class="footer__list">
              <li class="footer__lists">
                <a class="footer__links" href="./about.html">
                  <p class="footer__links-texts">About</p>
                </a>
              </li>
              <li class="footer__lists">
                <a class="footer__links" href="./location.html">
                  <p class="footer__links-texts">Location</p>
                </a>
              </li>
              <li class="footer__lists">
                <a class="footer__links" href="#">
                  <p class="footer__links-texts">Careers</p>
                </a>
              </li>
            </ul>
          </nav>
        </div>
        <div class="footer__icon-boxes">
          <a
            class="footer__icon-links"
            href="https://facebook.com/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              class="footer__icon-images"
              src="./icons/facebook.svg"
              alt="facebook"
            />
          </a>
          <a
            class="footer__icon-links"
            href="https://x.com/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              class="footer__icon-images"
              src="./icons/twitter.svg"
              alt="twitter"
            />
          </a>
          <a
            class="footer__icon-links"
            href="https://www.instagram.com/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <img
              class="footer__icon-images"
              src="./icons/instagram.svg"
              alt="instagram"
            />
          </a>
        </div>
      </div>
    </footer>
    <script src="./main.js"></script>
  </body>
</html>
